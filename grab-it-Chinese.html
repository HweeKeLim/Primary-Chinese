<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab It! - Primary Chinese Edition</title>
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --p1: #ff4757; --p2: #ffa502; --p3: #2ed573;
            --p4: #1e90ff; --p5: #3742fa; --p6: #7d5fff;
        }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        
        /* Menu */
        #menu {
            position: absolute; inset: 0; z-index: 100;
            background: radial-gradient(circle at center, #2f3542, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .lvl-btn {
            width: 120px; height: 120px; border-radius: 20px; border: none;
            color: white; font-size: 32px; font-weight: bold; cursor: pointer;
            transition: 0.2s; box-shadow: 0 8px 0 rgba(0,0,0,0.3);
        }
        .lvl-btn:hover { transform: scale(1.1); filter: brightness(1.2); }

        /* Game HUD */
        #hud {
            position: absolute; top: 0; width: 100%; display: flex; 
            flex-direction: column; align-items: center; z-index: 50; pointer-events: none;
        }
        #target-pinyin {
            background: rgba(0,0,0,0.85); padding: 10px 60px;
            border-radius: 0 0 30px 30px; border: 4px solid #fff;
            font-size: 55px; color: #fff; text-shadow: 0 0 10px #000;
            margin-top: 0;
        }
        #score-box {
            background: rgba(0,0,0,0.6); padding: 8px 25px; border-radius: 50px;
            margin-top: 10px; font-size: 24px; border: 1px solid rgba(255,255,255,0.3);
        }

        #status { position: absolute; bottom: 20px; color: #555; width: 100%; text-align: center; }

        canvas { display: block; width: 100vw; height: 100vh; }
        video { display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="font-size: 50px; margin-bottom: 0;">GRAB IT! 🖐️</h1>
    <p style="color: #ced4da; margin-bottom: 30px;">Pinch to grab the correct Chinese word!</p>
    <div class="grid">
        <button class="lvl-btn" style="background:var(--p1)" onclick="initGame('P1')">P1</button>
        <button class="lvl-btn" style="background:var(--p2)" onclick="initGame('P2')">P2</button>
        <button class="lvl-btn" style="background:var(--p3)" onclick="initGame('P3')">P3</button>
        <button class="lvl-btn" style="background:var(--p4)" onclick="initGame('P4')">P4</button>
        <button class="lvl-btn" style="background:var(--p5)" onclick="initGame('P5')">P5</button>
        <button class="lvl-btn" style="background:var(--p6)" onclick="initGame('P6')">P6</button>
    </div>
</div>

<div id="hud" class="hidden">
    <div id="target-pinyin">---</div>
    <div id="score-box">Score: 0</div>
</div>

<div id="status">Loading AI Hand Tracking...</div>

<video id="webcam" playsinline></video>
<canvas id="gameCanvas"></canvas>

    P6: "鞠躬|jū gōng,和睦|hé mù,矛盾|máo dùn,关键|guān jiàn,遗憾|yí hàn,犹豫|yóu yù,复杂|fù zá,谨慎|jǐn shèn,智慧|zhì huì,挑战|tiǎo zhàn,奋斗|fèn dòu,既然|jì rán,毕竟|bì jìng,由于|yóu yú,不仅|bù jǐn,反而|fǎn ér,何况|hé kuàng,除非|chú fēi,假如|jiǎ rú,按照|àn zhào,基于|jī yú,针对|zhēn duì,关于|guān yú,随着|suí zhe,甚至|shèn zhì,尤其|yóu qí,其中|qí zhōng,难怪|nán guài,幸亏|xìng kuī,千万|qiān wàn,未必|wèi bì,何必|hé bì,总之|zǒng zhī,积极|jī jí,消极|xiāo jí,悲观|bēi guān,乐观|lè guān,勤奋|qín fèn,懒惰|lǎn duò,谦虚|qiān xū,骄傲|jiāo ào,吝啬|lìn sè,大方|dà fāng,温柔|wēn róu,粗鲁|cū lǔ,诚实|chéng shí,虚伪|xū wěi,坚定|jiān dìng,动摇|dòng yáo,平凡|píng fán,卓越|zhuó yuè,核心|hé xīn,根本|gēn běn,简直|jiǎn zhí,毕竟|bì jìng,哪怕|nǎ pà,纵然|zòng rán,即便|jí biàn,不仅|bù jǐn,况且|kuàng qiě,甚至|shèn zhì,果然|guǒ rán,由于|yóu yú,从而|cóng ér,可见|kě jiàn,由于|yóu yú,因此|yīn cǐ,从而|cóng ér,既然|jì rán,于是|yú shì,虽然|suī rán,尽管|jǐn guǎn,只要|zhǐ yào,只有|zhǐ yǒu,除非|chú fēi,即便|jí biàn,哪怕|nǎ pà,既然|jì rán,由于|yóu yú,因此|yīn cǐ,由于|yóu yú,不仅|bù jǐn,甚至|shèn zhì,反而|fǎn ér,何况|hé kuàng,除非|chú fēi,基于|jī yú,显然|xiǎn rán,当然|dāng rán"

const video = document.getElementById('webcam');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const targetPinyin = document.getElementById('target-pinyin');
const scoreBox = document.getElementById('score-board');

let gameActive = false;
let currentLvl = "P1";
let score = 0;
let deck = [];
let target = null;
let floatingWords = [];
let pointer = { x: 0, y: 0, isGrabbing: false };
let audioCtx = null;

class Word {
    constructor(char) {
        this.char = char;
        this.reset();
    }
    reset() {
        this.x = Math.random() * (window.innerWidth - 150) + 75;
        this.y = Math.random() * (window.innerHeight - 250) + 200;
        let s = 3.5 + (currentLvl.at(-1) * 0.7);
        this.vx = (Math.random() - 0.5) * s;
        this.vy = (Math.random() - 0.5) * s;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 50 || this.x > window.innerWidth - 120) this.vx *= -1;
        if (this.y < 180 || this.y > window.innerHeight - 50) this.vy *= -1;
    }
    draw() {
        ctx.font = 'bold 45px sans-serif';
        ctx.fillStyle = "white";
        ctx.shadowColor = "black"; ctx.shadowBlur = 10;
        ctx.fillText(this.char, this.x, this.y);
        ctx.shadowBlur = 0;
    }
}

function speak(t) {
    window.speechSynthesis.cancel();
    let m = new SpeechSynthesisUtterance(t);
    m.lang = 'zh-CN'; m.rate = 0.85;
    window.speechSynthesis.speak(m);
}

function playSfx(f) {
    if(!audioCtx) return;
    let o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.frequency.value = f; 
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.3);
}

function nextRound() {
    if (deck.length === 0) {
        deck = DATA[currentLvl].split(',').map(s => {
            let [w, p] = s.split('|'); return {w, p};
        }).sort(() => Math.random() - 0.5);
    }
    target = deck.pop();
    targetPinyin.innerText = target.p;
    speak(target.w);

    let levelFullSet = DATA[currentLvl].split(',').map(s => s.split('|')[0]);
    let distractors = levelFullSet.filter(c => c !== target.w).sort(() => Math.random() - 0.5).slice(0, 10);
    floatingWords = [target.w, ...distractors].sort(() => Math.random() - 0.5).map(c => new Word(c));
}

async function initGame(lvl) {
    currentLvl = lvl;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    gameActive = true;
    await camera.start();
    nextRound();
}

function onResults(res) {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    ctx.save();
    ctx.scale(-1, 1); ctx.translate(-canvas.width, 0);
    ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    if (res.multiHandLandmarks?.[0]) {
        let landmarks = res.multiHandLandmarks[0];
        // Index Tip (8) and Thumb Tip (4)
        const indexTip = landmarks[8];
        const thumbTip = landmarks[4];
        
        pointer.x = (1 - indexTip.x) * canvas.width;
        pointer.y = indexTip.y * canvas.height;

        // Detection: Grabbing if thumb and index are close
        const dist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
        pointer.isGrabbing = dist < 0.06;

        // Draw Pointer
        ctx.font = '50px serif';
        ctx.fillText(pointer.isGrabbing ? "✊" : "🖐️", pointer.x - 25, pointer.y + 20);
    }

    if (gameActive) {
        floatingWords.forEach(w => {
            w.update(); w.draw();
            // Collision + Grabbing Logic
            if (pointer.isGrabbing && Math.hypot(pointer.x - (w.x + 30), pointer.y - (w.y - 20)) < 70) {
                if (w.char === target.w) { 
                    score += 10; playSfx(880); nextRound(); 
                } else { 
                    score = Math.max(0, score - 5); playSfx(150); w.reset(); 
                }
                scoreBox.innerText = `Score: ${score}`;
                pointer.isGrabbing = false; // Debounce grab
            }
        });
    }
}

const hands = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
hands.onResults(onResults);

const camera = new Camera(video, {
    onFrame: async () => { await hands.send({image: video}); },
    width: 1280, height: 720
});

// Update UI Loading message
hands.initialize().then(() => document.getElementById('status').innerText = "AI Tracking Ready!");

window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
