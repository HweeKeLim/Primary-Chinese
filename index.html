<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Eater: Primary School Chinese Series</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --p1: #ff4757; --p2: #ffa502; --p3: #2ed573;
            --p4: #1e90ff; --p5: #3742fa; --p6: #7d5fff;
        }
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; color: white; }
        
        /* Menu Screen */
        #menu {
            position: absolute; inset: 0; z-index: 100;
            background: radial-gradient(circle at center, #1e272e, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .lvl-btn {
            width: 120px; height: 120px; border-radius: 20px; border: none;
            color: white; font-size: 32px; font-weight: bold; cursor: pointer;
            transition: 0.2s; box-shadow: 0 8px 0 rgba(0,0,0,0.3);
        }
        .lvl-btn:hover { transform: scale(1.1); filter: brightness(1.2); }
        .lvl-btn:active { transform: translateY(4px); box-shadow: none; }

        /* Game HUD */
        #hud {
            position: absolute; top: 0; width: 100%; display: flex; 
            flex-direction: column; align-items: center; z-index: 50; pointer-events: none;
        }
        #target-box {
            background: rgba(0,0,0,0.85); padding: 15px 50px;
            border-radius: 0 0 30px 30px; border: 4px solid white;
            font-size: 60px; color: #fff; text-shadow: 0 0 15px #000;
        }
        #score-box {
            background: rgba(0,0,0,0.6); padding: 8px 25px; border-radius: 50px;
            margin-top: 10px; font-size: 24px; border: 1px solid rgba(255,255,255,0.3);
        }

        canvas { display: block; width: 100vw; height: 100vh; }
        video { display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="font-size: 50px; margin-bottom: 0;">WORD EATER 👄</h1>
    <p style="color: #888; margin-bottom: 30px;">Singapore Primary Chinese Syllabus (600 Words)</p>
    <div class="grid">
        <button class="lvl-btn" style="background:var(--p1)" onclick="initGame('P1')">P1</button>
        <button class="lvl-btn" style="background:var(--p2)" onclick="initGame('P2')">P2</button>
        <button class="lvl-btn" style="background:var(--p3)" onclick="initGame('P3')">P3</button>
        <button class="lvl-btn" style="background:var(--p4)" onclick="initGame('P4')">P4</button>
        <button class="lvl-btn" style="background:var(--p5)" onclick="initGame('P5')">P5</button>
        <button class="lvl-btn" style="background:var(--p6)" onclick="initGame('P6')">P6</button>
    </div>
</div>

<div id="hud" class="hidden">
    <div id="target-box">---</div>
    <div id="score-box">Score: 0</div>
</div>

<video id="webcam" playsinline></video>
<canvas id="gameCanvas"></canvas>

const video = document.getElementById('webcam');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const targetBox = document.getElementById('target-box');
const scoreBox = document.getElementById('score-box');

let gameActive = false;
let currentLvl = "P1";
let score = 0;
let deck = [];
let target = null;
let floatingWords = [];
let mouth = { x: 0, y: 0, open: false };
let audioCtx = null;

class Word {
    constructor(obj) {
        this.char = obj.w;
        this.reset();
    }
    reset() {
        this.x = Math.random() * (window.innerWidth - 150) + 75;
        this.y = Math.random() * (window.innerHeight - 250) + 200;
        let s = 4 + (currentLvl.at(-1) * 0.8);
        this.vx = (Math.random() - 0.5) * s;
        this.vy = (Math.random() - 0.5) * s;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 50 || this.x > window.innerWidth - 120) this.vx *= -1;
        if (this.y < 180 || this.y > window.innerHeight - 50) this.vy *= -1;
    }
    draw() {
        ctx.font = 'bold 45px sans-serif';
        ctx.shadowColor = "black"; ctx.shadowBlur = 10;
        ctx.fillStyle = "white";
        ctx.fillText(this.char, this.x, this.y);
        ctx.shadowBlur = 0;
    }
}

function speak(t) {
    window.speechSynthesis.cancel();
    let m = new SpeechSynthesisUtterance(t);
    m.lang = 'zh-CN'; m.rate = 0.8;
    window.speechSynthesis.speak(m);
}

function playSfx(f) {
    if(!audioCtx) return;
    let o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.3);
}

function nextRound() {
    if (deck.length === 0) {
        deck = DATA[currentLvl].split(',').map(s => {
            let [w, p] = s.split('|'); return {w, p};
        }).sort(() => Math.random() - 0.5);
    }
    target = deck.pop();
    targetBox.innerText = target.p;
    speak(target.w);

    let levelFullSet = DATA[currentLvl].split(',').map(s => s.split('|')[0]);
    let distractors = levelFullSet.filter(c => c !== target.w).sort(() => Math.random() - 0.5).slice(0, 10);
    floatingWords = [target.w, ...distractors].sort(() => Math.random() - 0.5).map(c => new Word({w:c}));
}

async function initGame(lvl) {
    currentLvl = lvl;
    audioCtx = new AudioContext();
    document.getElementById('menu').classList.add('hidden');
    hud.classList.remove('hidden');
    gameActive = true;
    await camera.start();
    nextRound();
}

function onResults(res) {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    ctx.save();
    ctx.scale(-1, 1); ctx.translate(-canvas.width, 0);
    ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    if (res.multiFaceLandmarks?.[0]) {
        let l = res.multiFaceLandmarks[0];
        mouth.x = (1 - l[13].x) * canvas.width;
        mouth.y = l[13].y * canvas.height;
        mouth.open = Math.abs(l[13].y - l[14].y) > 0.045;

        ctx.beginPath(); ctx.arc(mouth.x, mouth.y, 40, 0, 7);
        ctx.strokeStyle = mouth.open ? "#00ff88" : "white";
        ctx.lineWidth = 5; ctx.stroke();
    }

    if (gameActive) {
        floatingWords.forEach(w => {
            w.update(); w.draw();
            if (mouth.open && Math.hypot(mouth.x - (w.x + 30), mouth.y - (w.y - 20)) < 70) {
                if (w.char === target.w) { score += 10; playSfx(800); nextRound(); }
                else { score = Math.max(0, score - 5); playSfx(150); w.reset(); }
                scoreBox.innerText = `Score: ${score}`;
                mouth.open = false;
            }
        });
    }
}

const faceMesh = new FaceMesh({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5});
faceMesh.onResults(onResults);

const camera = new Camera(video, {
    onFrame: async () => { await faceMesh.send({image: video}); },
    width: 1280, height: 720
});

window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
</body>
</html>
