<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grab It! - Primary Chinese Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --p1: #ff4757; --p2: #ffa502; --p3: #2ed573;
            --p4: #1e90ff; --p5: #3742fa; --p6: #7d5fff;
        }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Rounded MT Bold', sans-serif; color: white; }
        
        #menu {
            position: absolute; inset: 0; z-index: 100;
            background: radial-gradient(circle, #2f3542, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .lvl-btn {
            width: 130px; height: 130px; border-radius: 25px; border: none;
            color: white; font-size: 35px; font-weight: bold; cursor: pointer;
            transition: 0.2s; box-shadow: 0 8px 0 rgba(0,0,0,0.4);
        }
        .lvl-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        #hud {
            position: absolute; top: 0; width: 100%; display: flex; 
            flex-direction: column; align-items: center; z-index: 50; pointer-events: none;
        }
        #target-pinyin {
            background: rgba(0,0,0,0.85); padding: 15px 60px;
            border-radius: 0 0 40px 40px; border: 5px solid #fff;
            font-size: 65px; color: #fff; text-shadow: 0 0 10px #000;
        }
        #score-box {
            background: rgba(0,0,0,0.6); padding: 10px 30px; border-radius: 50px;
            margin-top: 15px; font-size: 28px; border: 1px solid white;
        }

        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 200;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
        }

        canvas { display: block; width: 100vw; height: 100vh; }
        video { display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loading-screen">Loading AI Hand Tracker...</div>

<div id="menu" class="hidden">
    <h1 style="font-size: 55px; margin: 0; color: #fff;">GRAB IT! 🖐️</h1>
    <p style="color: #ccc; font-size: 20px;">Move your hand and <b>Grip/Fist</b> to grab characters!</p>
    <div class="grid">
        <button class="lvl-btn" style="background:var(--p1)" onclick="start('P1')">P1</button>
        <button class="lvl-btn" style="background:var(--p2)" onclick="start('P2')">P2</button>
        <button class="lvl-btn" style="background:var(--p3)" onclick="start('P3')">P3</button>
        <button class="lvl-btn" style="background:var(--p4)" onclick="start('P4')">P4</button>
        <button class="lvl-btn" style="background:var(--p5)" onclick="start('P5')">P5</button>
        <button class="lvl-btn" style="background:var(--p6)" onclick="start('P6')">P6</button>
    </div>
</div>

<div id="hud" class="hidden">
    <div id="target-pinyin">---</div>
    <div id="score-box">Score: 0</div>
</div>

<video id="webcam" playsinline></video>
<canvas id="gameCanvas"></canvas>

const video = document.getElementById('webcam');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameActive = false;
let currentLvl = "P1";
let score = 0;
let deck = [];
let target = null;
let floatingWords = [];
let hand = { x: 0, y: 0, isGrabbing: false };
let audioCtx = null;

class Word {
    constructor(w) { this.char = w; this.reset(); }
    reset() {
        this.x = Math.random() * (window.innerWidth - 150) + 75;
        this.y = Math.random() * (window.innerHeight - 300) + 200;
        let s = 3.5 + (currentLvl[1] * 0.7);
        this.vx = (Math.random() - 0.5) * s;
        this.vy = (Math.random() - 0.5) * s;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        if (this.x < 50 || this.x > window.innerWidth - 120) this.vx *= -1;
        if (this.y < 200 || this.y > window.innerHeight - 50) this.vy *= -1;
    }
    draw() {
        ctx.font = 'bold 48px sans-serif'; ctx.fillStyle = "white";
        ctx.shadowColor = "black"; ctx.shadowBlur = 10;
        ctx.fillText(this.char, this.x, this.y);
        ctx.shadowBlur = 0;
    }
}

function speak(t) {
    window.speechSynthesis.cancel();
    let m = new SpeechSynthesisUtterance(t);
    m.lang = 'zh-CN'; m.rate = 0.8;
    window.speechSynthesis.speak(m);
}

function playSfx(f) {
    if(!audioCtx) return;
    let o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.3);
}

function nextRound() {
    if (deck.length === 0) {
        deck = VOCAB_DATA[currentLvl].split(',').map(s => {
            let [w, p] = s.split('|'); return {w, p};
        }).sort(() => Math.random() - 0.5);
    }
    target = deck.pop();
    document.getElementById('target-pinyin').innerText = target.p;
    speak(target.w);
    let all = VOCAB_DATA[currentLvl].split(',').map(s => s.split('|')[0]);
    let dist = all.filter(c => c !== target.w).sort(() => Math.random() - 0.5).slice(0, 10);
    floatingWords = [target.w, ...dist].sort(() => Math.random() - 0.5).map(c => new Word(c));
}

async function start(lvl) {
    currentLvl = lvl;
    audioCtx = new AudioContext();
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    gameActive = true;
    await camera.start();
    nextRound();
}

function onResults(res) {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    ctx.save();
    ctx.scale(-1, 1); ctx.translate(-canvas.width, 0);
    ctx.drawImage(res.image, 0, 0, canvas.width, canvas.height);
    ctx.restore();

    if (res.multiHandLandmarks?.[0]) {
        let l = res.multiHandLandmarks[0];
        // Calculate Palm Center
        hand.x = (1 - l[9].x) * canvas.width;
        hand.y = l[9].y * canvas.height;

        // Grip Logic: Distances of fingertips (4, 8, 12, 16, 20) to palm (0)
        let fingerSum = 0;
        [4, 8, 12, 16, 20].forEach(idx => {
            fingerSum += Math.hypot(l[idx].x - l[0].x, l[idx].y - l[0].y);
        });
        // If average distance is small, hand is closed (grip)
        hand.isGrabbing = (fingerSum / 5) < 0.18;

        ctx.font = '60px serif';
        ctx.fillText(hand.isGrabbing ? "✊" : "🖐️", hand.x - 30, hand.y + 30);
    }

    if (gameActive) {
        floatingWords.forEach(w => {
            w.update(); w.draw();
            if (hand.isGrabbing && Math.hypot(hand.x - (w.x + 30), hand.y - (w.y - 20)) < 80) {
                if (w.char === target.w) { score += 10; playSfx(800); nextRound(); }
                else { score = Math.max(0, score - 5); playSfx(150); w.reset(); }
                document.getElementById('score-box').innerText = `Score: ${score}`;
                hand.isGrabbing = false;
            }
        });
    }
}

const hands = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
// Lite Model Complexity for speed
hands.setOptions({maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
hands.onResults(onResults);

const camera = new Camera(video, {
    onFrame: async () => { await hands.send({image: video}); },
    width: 1280, height: 720
});

hands.initialize().then(() => {
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('menu').classList.remove('hidden');
});

window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
</script>
